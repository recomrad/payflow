<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Разделение расходов</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h2>Разделение расходов</h2>

<div class="controls">
    <button id="addBtn">Добавить</button>
    <button id="saveBtn">Сохранить</button>
    <span class="vr">|</span>
    <span id="count"></span>
    <span class="vr">|</span>
    <label>
        Округление:
        <select id="roundMode">
            <option value="100">До 100</option>
            <option value="10" selected>До 10</option>
            <option value="ceil">До целого</option>
            <option value="none">Без округления</option>
        </select>
    </label>
</div>

<div id="toast"></div>

<table id="peopleTable">
    <thead>
        <tr>
            <th style='width: 60px;'>#</th>
            <th class='whoHeader'>Кто</th>
            <th class='amountHeader'>Вложил (₽)</th>
            <th style='width: 160px;'>Не скидывается</th>
            <th></th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script src="js/script.js"></script>
</body>
</html>
