<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Разделение расходов</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h2>Разделение расходов</h2>

<div class="controls">
    <button id="addBtn">Добавить</button>
    <button id="saveBtn">Сохранить</button>
    <span id="count"></span>
    <label>
    Округление:
    <select id="roundMode">
        <option value="ceil" selected>Вверх</option>
        <option value="none">Без округления</option>
        <option value="nearest">До ближайшего</option>
        <option value="10">До 10</option>
        <option value="100">До 100</option>
    </select>
</label>
</div>

<div id="toast"></div>

<table id="peopleTable">
    <thead>
        <tr>
            <th>#</th>
            <th>Кто</th>
            <th>Вложил (₽)</th>
            <th>Не скидывается</th>
            <th></th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script src="script.js"></script>
</body>
</html>
